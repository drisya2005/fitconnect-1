<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Membership — FitConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(14px);
        }

        .nav-link {
            color: #94a3b8;
            font-size: .875rem;
            font-weight: 500;
            transition: color .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1f5f9;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-white">

    <nav class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/80 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/home.html" class="font-extrabold text-lg flex items-center gap-2">🏋️ <span
                    class="gradient-text">FitConnect</span></a>
            <div class="flex items-center gap-5">
                <a href="/home.html" class="nav-link">Home</a>
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/gyms.html" class="nav-link">Gyms</a>
                <a href="/membership.html" class="nav-link active">Membership</a>
                <a href="/fitness.html" class="nav-link">Fitness</a>
                <a href="/profile.html" class="nav-link">Profile</a>
                <button id="signOutBtn"
                    class="bg-white/5 border border-white/10 text-slate-300 text-sm font-medium px-4 py-1.5 rounded-lg hover:bg-white/10 transition-all">Sign
                    out</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4">Choose Your <span class="gradient-text">Power Plan</span></h1>
            <p class="text-slate-400 max-w-xl mx-auto">One membership that unlocks Kerala's best gyms. Choose a tier
                that fits your goals.</p>
        </div>

        <div id="loadingEl" class="flex justify-center py-12">
            <div class="spinner !border-t-purple-500 !w-8 !h-8"></div>
        </div>

        <div id="plansGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8 hidden">
            <!-- Plans will be injected here -->
        </div>

        <div id="membershipStatus" class="mt-16 glass rounded-2xl p-8 hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">💳 Your Current Membership</h2>
            <div id="myMemberships" class="space-y-4">
                <!-- User memberships will be injected here -->
            </div>
        </div>
    </div>

    <!-- Modal for Purchase -->
    <div id="purchaseModal"
        class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur hidden">
        <div class="glass w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-2">Confirm Purchase</h3>
            <p id="modalPlanName" class="text-purple-400 font-semibold mb-4"></p>
            <div class="space-y-4 mb-6">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Monthly Fee</span>
                    <span id="modalFee" class="font-bold"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Duration</span>
                    <span>1 Month</span>
                </div>
                <div class="border-t border-white/10 pt-4 flex justify-between font-extrabold text-lg">
                    <span>Total To Pay</span>
                    <span id="modalTotal"></span>
                </div>
            </div>
            <div id="purchaseAlert"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()"
                    class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl hover:bg-white/10 transition-all">Cancel</button>
                <button id="confirmBuyBtn" onclick="executePurchase()"
                    class="flex-1 bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span>Pay & Join</span>
                    <span id="buySpinner" class="spinner hidden"></span>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initFirebase, fetchWithAuth, doSignOut } from '/firebase-init.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';

        const { auth } = await initFirebase();
        let selectedPlan = null;

        onAuthStateChanged(auth, async user => {
            if (!user) { window.location.href = '/'; return; }
            await loadPlans();
            await loadMyMemberships();
        });

        document.getElementById('signOutBtn').onclick = async () => { await doSignOut(); window.location.href = '/'; };

        async function loadPlans() {
            try {
                const res = await fetch('/membership/plans');
                const data = await res.json();
                if (!data.ok) return;

                const grid = document.getElementById('plansGrid');
                grid.innerHTML = data.plans.map(p => {
                    const isPop = p.name.includes('Standard');
                    return `
            <div class="glass rounded-2xl p-8 flex flex-col relative ${isPop ? 'border-brand ring-1 ring-brand/50' : ''}">
              ${isPop ? '<span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-brand text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Most Popular</span>' : ''}
              <h3 class="text-xl font-bold mb-1">${p.name}</h3>
              <p class="text-slate-400 text-sm mb-6">${p.description}</p>
              <div class="mb-6">
                <span class="text-4xl font-extrabold">₹${p.monthlyFee}</span>
                <span class="text-slate-400">/mo</span>
              </div>
              <ul class="space-y-3 mb-8 flex-1">
                ${p.features.map(f => `<li class="flex items-center gap-2 text-sm text-slate-300"><span class="text-green-400 text-xs">✔</span> ${f}</li>`).join('')}
              </ul>
              <button onclick="openModal('${p.name}', ${p.monthlyFee})" class="w-full ${isPop ? 'bg-brand hover:bg-brand-dark' : 'bg-white/5 hover:bg-white/10 border border-white/10'} text-white font-bold py-3 rounded-xl transition-all">Select Plan</button>
            </div>`;
                }).join('');

                document.getElementById('loadingEl').classList.add('hidden');
                grid.classList.remove('hidden');
            } catch (err) { console.error(err); }
        }

        async function loadMyMemberships() {
            try {
                const res = await fetchWithAuth('/membership/my');
                const data = await res.json();
                if (!data.ok || !data.memberships.length) return;

                document.getElementById('membershipStatus').classList.remove('hidden');
                const list = document.getElementById('myMemberships');
                list.innerHTML = data.memberships.map(m => {
                    const active = new Date(m.endDate._seconds * 1000) > new Date() && m.remainingBalance > 0;
                    return `
            <div class="bg-white/5 border border-white/10 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="font-bold">${m.planName}</p>
                <p class="text-xs text-slate-400">Expires: ${new Date(m.endDate._seconds * 1000).toLocaleDateString()}</p>
              </div>
              <div class="text-right">
                <p class="font-extrabold text-lg">₹${m.remainingBalance.toFixed(0)}</p>
                <span class="text-[10px] font-bold px-2 py-0.5 rounded ${active ? 'bg-green-500/20 text-green-400' : 'bg-slate-500/20 text-slate-400'}">${active ? 'ACTIVE' : 'EXPIRED/LOW BALANCE'}</span>
              </div>
            </div>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        window.openModal = (name, fee) => {
            selectedPlan = { planName: name, monthlyFee: fee };
            document.getElementById('modalPlanName').textContent = name;
            document.getElementById('modalFee').textContent = `₹${fee}`;
            document.getElementById('modalTotal').textContent = `₹${fee}`;
            document.getElementById('purchaseModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('purchaseModal').classList.add('hidden');
            document.getElementById('purchaseAlert').innerHTML = '';
        };

        window.executePurchase = async () => {
            const btn = document.getElementById('confirmBuyBtn');
            const spinner = document.getElementById('buySpinner');
            const alertBox = document.getElementById('purchaseAlert');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            alertBox.innerHTML = '';

            try {
                const res = await fetchWithAuth('/membership/buy', {
                    method: 'POST',
                    body: JSON.stringify({ ...selectedPlan, months: 1 })
                });
                const data = await res.json();

                if (data.ok) {
                    alertBox.innerHTML = `<p class="mt-4 text-green-400 text-sm font-medium text-center">Membership activated! Redirecting…</p>`;
                    setTimeout(() => window.location.href = '/dashboard.html', 1500);
                } else {
                    throw new Error(data.error || 'Purchase failed');
                }
            } catch (err) {
                alertBox.innerHTML = `<p class="mt-4 text-red-400 text-sm font-medium text-center">${err.message}</p>`;
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        };
    </script>
</body>

</html>
