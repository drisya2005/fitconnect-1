<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gym History — FitConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(14px);
        }

        .nav-link {
            color: #94a3b8;
            font-size: .875rem;
            font-weight: 500;
            transition: color .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1f5f9;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-white">

    <nav class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/80 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/home.html" class="font-extrabold text-lg flex items-center gap-2">🏋️ <span
                    class="gradient-text">FitConnect</span></a>
            <div class="flex items-center gap-5">
                <a href="/home.html" class="nav-link">Home</a>
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/gyms.html" class="nav-link">Gyms</a>
                <a href="/membership.html" class="nav-link">Membership</a>
                <a href="/fitness.html" class="nav-link">Fitness</a>
                <a href="/profile.html" class="nav-link">Profile</a>
                <button id="signOutBtn"
                    class="bg-white/5 border border-white/10 text-slate-300 text-sm font-medium px-4 py-1.5 rounded-lg hover:bg-white/10 transition-all">Sign
                    out</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-extrabold mb-1">Gym <span class="gradient-text">Visits</span></h1>
                <p class="text-slate-400">Detailed logs of your gym sessions and fee deductions.</p>
            </div>
            <a href="/checkin.html"
                class="bg-brand text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-all">Check In Now</a>
        </div>

        <div id="loadingLogs" class="flex justify-center py-24">
            <div class="spinner !border-t-purple-500 !w-10 !h-10"></div>
        </div>

        <div id="historyTable" class="hidden">
            <div class="glass rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-slate-400 uppercase text-[10px] tracking-widest font-bold">
                        <tr>
                            <th class="px-6 py-4">Date</th>
                            <th class="px-6 py-4">Gym Name</th>
                            <th class="px-6 py-4">Duration</th>
                            <th class="px-6 py-4 text-right">Deducted</th>
                        </tr>
                    </thead>
                    <tbody id="logsList" class="divide-y divide-white/5">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden text-center py-16">
                <p class="text-slate-500 italic">No gym visits recorded yet.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initFirebase, fetchWithAuth, doSignOut } from '/firebase-init.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';

        const { auth } = await initFirebase();
        onAuthStateChanged(auth, async u => {
            if (!u) { window.location.href = '/'; return; }
            await loadHistory();
        });

        document.getElementById('signOutBtn').onclick = async () => { await doSignOut(); window.location.href = '/'; };

        async function loadHistory() {
            try {
                const res = await fetchWithAuth('/gym/history');
                const data = await res.json();

                document.getElementById('loadingLogs').classList.add('hidden');
                document.getElementById('historyTable').classList.remove('hidden');

                if (data.ok && data.history.length) {
                    const list = document.getElementById('logsList');
                    list.innerHTML = data.history.map(v => `
            <tr class="hover:bg-white/[0.02] transition-colors">
              <td class="px-6 py-4">
                <p class="font-medium text-white">${new Date(v.createdAt._seconds * 1000).toLocaleDateString()}</p>
                <p class="text-[10px] text-slate-500 leading-none mt-1">${new Date(v.createdAt._seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
              </td>
              <td class="px-6 py-4">
                <p class="font-bold text-slate-200">${v.gymName || 'N/A'}</p>
              </td>
              <td class="px-6 py-4">
                <span class="px-2 py-0.5 bg-white/5 border border-white/10 rounded text-xs text-slate-300">${v.days} day(s)</span>
              </td>
              <td class="px-6 py-4 text-right">
                <span class="font-extrabold text-red-400">-₹${(v.deductedAmount || 0).toFixed(0)}</span>
              </td>
            </tr>`).join('');
                } else {
                    document.getElementById('logsList').innerHTML = '';
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }
    </script>
</body>

</html>
