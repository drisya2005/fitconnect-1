<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your Profile — FitConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(14px);
        }

        .nav-link {
            color: #94a3b8;
            font-size: .875rem;
            font-weight: 500;
            transition: color .2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #f1f5f9;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-white">

    <nav class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/80 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/home.html" class="font-extrabold text-lg flex items-center gap-2">🏋️ <span
                    class="gradient-text">FitConnect</span></a>
            <div class="flex items-center gap-5">
                <a href="/home.html" class="nav-link">Home</a>
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/gyms.html" class="nav-link">Gyms</a>
                <a href="/membership.html" class="nav-link">Membership</a>
                <a href="/fitness.html" class="nav-link">Fitness</a>
                <a href="/profile.html" class="nav-link active">Profile</a>
                <button id="signOutBtn"
                    class="bg-white/5 border border-white/10 text-slate-300 text-sm font-medium px-4 py-1.5 rounded-lg hover:bg-white/10 transition-all">Sign
                    out</button>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="flex items-center gap-6 mb-12">
            <div
                class="w-24 h-24 rounded-full bg-gradient-to-br from-purple-600 to-cyan-500 flex items-center justify-center text-4xl shadow-xl border-4 border-white/5">
                👤</div>
            <div>
                <h1 id="userNameHeading" class="text-3xl font-extrabold">Your Profile</h1>
                <p id="userEmail" class="text-slate-400">Loading…</p>
                <span id="userRole"
                    class="inline-block mt-2 px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold tracking-widest uppercase">Basic
                    User</span>
            </div>
        </div>

        <form id="profileForm" class="glass rounded-2xl p-8 space-y-6" onsubmit="updateProfile(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Display
                        Name</label>
                    <input type="text" id="profName" placeholder="Enter your name"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50" />
                </div>
                <div>
                    <label class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Fitness
                        Goal</label>
                    <select id="profGoal"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50">
                        <option value="weight_loss">Weight Loss</option>
                        <option value="muscle_gain">Muscle Gain</option>
                        <option value="endurance">Endurance</option>
                        <option value="general_fitness">General Fitness</option>
                        <option value="flexibility">Flexibility</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Age</label>
                    <input type="number" id="profAge" placeholder="25"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50" />
                </div>
                <div>
                    <label
                        class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Gender</label>
                    <select id="profGender"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Height
                        (cm)</label>
                    <input type="number" id="profHeight" placeholder="175"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50" />
                </div>
                <div>
                    <label class="text-slate-400 text-xs font-medium block mb-1.5 uppercase tracking-wider">Weight
                        (kg)</label>
                    <input type="number" step="0.1" id="profWeight" placeholder="70"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand/50" />
                </div>
            </div>

            <div id="profAlert"></div>

            <button type="submit" id="profBtn"
                class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>Save Profile Changes</span>
                <span id="profSpinner" class="spinner hidden"></span>
            </button>
        </form>

        <div class="mt-8 text-center px-8 border border-white/5 rounded-2xl py-6 bg-white/[0.02]">
            <p class="text-slate-500 text-xs">Joined FitConnect on <span id="joinDate"
                    class="text-slate-400 font-medium">…</span></p>
        </div>
    </div>

    <script type="module">
        import { initFirebase, fetchWithAuth, doSignOut } from '/firebase-init.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';

        const { auth } = await initFirebase();
        onAuthStateChanged(auth, async u => {
            if (!u) { window.location.href = '/'; return; }
            document.getElementById('userEmail').textContent = u.email;
            await loadProfile();
        });

        document.getElementById('signOutBtn').onclick = async () => { await doSignOut(); window.location.href = '/'; };

        async function loadProfile() {
            try {
                const res = await fetchWithAuth('/profile');
                const data = await res.json();
                if (!data.ok) return;

                const p = data.profile;
                document.getElementById('profName').value = p.displayName || '';
                document.getElementById('profGoal').value = p.goal || 'general_fitness';
                document.getElementById('profAge').value = p.age || '';
                document.getElementById('profGender').value = p.gender || 'male';
                document.getElementById('profHeight').value = p.heightCm || '';
                document.getElementById('profWeight').value = p.weightKg || '';
                document.getElementById('userRole').textContent = (p.role || 'user') + ' Member';
                document.getElementById('joinDate').textContent = p.createdAt ? new Date(p.createdAt._seconds * 1000).toLocaleDateString() : '—';
                if (p.displayName) document.getElementById('userNameHeading').textContent = p.displayName;
            } catch (err) { console.error(err); }
        }

        window.updateProfile = async e => {
            e.preventDefault();
            const btn = document.getElementById('profBtn');
            const spinner = document.getElementById('profSpinner');
            const alertBox = document.getElementById('profAlert');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            alertBox.innerHTML = '';

            const body = {
                displayName: document.getElementById('profName').value,
                goal: document.getElementById('profGoal').value,
                age: document.getElementById('profAge').value,
                gender: document.getElementById('profGender').value,
                heightCm: document.getElementById('profHeight').value,
                weightKg: document.getElementById('profWeight').value
            };

            try {
                const res = await fetchWithAuth('/profile/update', { method: 'PUT', body: JSON.stringify(body) });
                const data = await res.json();
                if (!data.ok) throw new Error(data.error);

                alertBox.innerHTML = `<p class="mb-2 text-green-400 text-sm font-medium text-center">Profile updated successfully!</p>`;
                if (body.displayName) document.getElementById('userNameHeading').textContent = body.displayName;
            } catch (err) {
                alertBox.innerHTML = `<p class="mb-2 text-red-400 text-sm font-medium text-center">${err.message}</p>`;
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        };
    </script>
</body>

</html>
