<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Forgot Password — FitConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🔐</div>
            <h1 class="text-2xl font-extrabold gradient-text">Reset Password</h1>
            <p class="text-slate-400 text-sm mt-1">Enter your email to receive a reset link</p>
        </div>
        <form id="resetForm" class="flex flex-col gap-4" onsubmit="submitReset(event)">
            <div>
                <label class="text-slate-400 text-xs font-medium block mb-1">Email address</label>
                <input id="resetEmail" type="email" required placeholder="you@example.com"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/50" />
            </div>
            <div id="resetAlert"></div>
            <button type="submit" id="resetBtn"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                <span id="resetBtnText">Send Reset Link</span>
                <span id="resetSpinner" class="spinner hidden"></span>
            </button>
            <a href="/" class="text-center text-slate-400 text-sm hover:text-white transition-colors">←
                Back to
                Login</a>
        </form>
    </div>

    <script type="module">
        import { initFirebase } from '/firebase-init.js';
        import { sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';

        const { auth } = await initFirebase();

        window.submitReset = async e => {
            e.preventDefault();
            const el = document.getElementById('resetAlert');
            const btn = document.getElementById('resetBtn');
            const spin = document.getElementById('resetSpinner');
            const txt = document.getElementById('resetBtnText');
            el.innerHTML = '';
            btn.disabled = true; spin.classList.remove('hidden'); txt.textContent = 'Sending…';
            try {
                await sendPasswordResetEmail(auth, document.getElementById('resetEmail').value.trim());
                el.innerHTML = `<div class="border rounded-lg px-3 py-2 text-sm bg-green-500/15 border-green-500/30 text-green-400">
          ✅ Reset link sent! Check your inbox.
        </div>`;
                document.getElementById('resetForm').reset();
            } catch (err) {
                const msg = err.code === 'auth/user-not-found' ? 'No account with this email.' : err.message;
                el.innerHTML = `<div class="border rounded-lg px-3 py-2 text-sm bg-red-500/15 border-red-500/30 text-red-400">${msg}</div>`;
            } finally {
                btn.disabled = false; spin.classList.add('hidden'); txt.textContent = 'Send Reset Link';
            }
        };
    </script>
</body>

</html>
